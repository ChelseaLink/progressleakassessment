<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrongHER Progress Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xn3pq9fysq");
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#1e0f18;color:#fff;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(229,58,145,0.12) 0%,transparent 45%),radial-gradient(ellipse at 85% 90%,rgba(160,16,96,0.10) 0%,transparent 45%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:32px 20px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
.prog-wrap{margin-bottom:24px;display:none;}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#c090aa;font-weight:500;}
.prog-count{font-size:10px;color:#c090aa;}
.prog-track{height:2px;background:#4a2538;border-radius:10px;position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,#a01060,#e53a91);border-radius:10px;transition:width 0.65s cubic-bezier(0.4,0,0.2,1);}
.card{background:#2d1a24;border-radius:20px;border:1px solid #4a2538;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(21,10,18,0.6);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#e53a91,#a01060,transparent);}
.screen{display:none;opacity:0;}
.screen.active{display:block;animation:fadeIn 0.35s ease forwards;}
.screen.exit{animation:fadeOut 0.18s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── INTRO ── */
.intro-wrap{padding:48px 40px 44px;text-align:center;}
.intro-eyebrow{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:#e53a91;font-weight:700;margin-bottom:28px;}
.intro-h1{font-family:'Fraunces',serif;font-size:38px;font-weight:700;line-height:1.18;color:#fff;margin-bottom:20px;letter-spacing:-0.02em;}
.intro-h1 em{font-style:italic;color:#e53a91;}
.intro-body{font-size:15px;line-height:1.65;color:#e0c4d4;font-weight:300;margin-bottom:36px;}
.intro-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#e53a91,#a01060);color:#fff;border:none;border-radius:14px;padding:17px 32px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;box-shadow:0 4px 28px rgba(229,58,145,0.45);margin-bottom:28px;transition:all 0.2s ease;}
.intro-btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(229,58,145,0.55);}
.intro-stats{display:flex;border:1px solid #4a2538;border-radius:14px;overflow:hidden;}
.stat-col{flex:1;padding:16px 8px;text-align:center;background:rgba(229,58,145,0.04);}
.stat-col+.stat-col{border-left:1px solid #4a2538;}
.stat-num{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#fff;line-height:1;margin-bottom:5px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#c090aa;font-weight:500;}

/* ── QUESTION ── */
.q-wrap{padding:40px 40px 36px;}
.q-badge{display:inline-flex;align-items:center;background:rgba(229,58,145,0.1);border:1px solid rgba(229,58,145,0.22);color:#e53a91;font-size:9.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:5px 13px;border-radius:100px;margin-bottom:18px;}
.q-text{font-family:'Fraunces',serif;font-size:21px;font-weight:600;line-height:1.32;color:#fff;margin-bottom:6px;}
.q-sub{font-size:13px;color:#e0c4d4;margin-bottom:22px;font-weight:300;font-style:italic;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.choice{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:rgba(30,15,24,0.7);border:1.5px solid #4a2538;border-radius:12px;cursor:pointer;transition:all 0.18s ease;text-align:left;width:100%;font-family:'DM Sans',sans-serif;}
.choice:hover{border-color:rgba(229,58,145,0.5);transform:translateX(3px);}
.choice.sel{border-color:#e53a91;background:rgba(229,58,145,0.08);transform:translateX(3px);}
.c-radio{width:18px;height:18px;border-radius:50%;border:2px solid #4a2538;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.18s ease;}
.choice:hover .c-radio{border-color:#e53a91;}
.choice.sel .c-radio{border-color:#e53a91;background:#e53a91;box-shadow:0 0 8px rgba(229,58,145,0.5);}
.choice.sel .c-radio::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;display:block;}
.c-text{font-size:13.5px;line-height:1.5;color:#e0c4d4;flex:1;}
.choice.sel .c-text{color:#f0d8e8;font-weight:500;}
.back-btn{background:none;border:none;color:#c090aa;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:4px;text-decoration:underline;text-underline-offset:3px;opacity:0.75;transition:opacity 0.18s;}
.back-btn:hover{opacity:1;}

/* ── RESULT ── */
.r-wrap{padding:40px 40px 36px;}
.r-divider{height:1px;background:linear-gradient(90deg,transparent,#4a2538,transparent);margin:22px 0;}
.r-eyebrow{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;color:#c090aa;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.r-eyebrow::before,.r-eyebrow::after{content:'';flex:1;height:1px;background:#4a2538;}
.r-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.22;color:#fff;margin-bottom:10px;}
.r-title em{font-style:italic;color:#e53a91;}
.health-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.health-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.health-txt{font-family:'Fraunces',serif;font-size:15px;font-weight:600;}
.dash-lbl{font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:#c090aa;margin-bottom:12px;}
.leak-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.leak-row{display:flex;align-items:center;gap:10px;}
.leak-name{font-size:12px;font-weight:500;color:#e0c4d4;width:100px;flex-shrink:0;}
.leak-track{flex:1;height:6px;background:#4a2538;border-radius:10px;overflow:hidden;}
.leak-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
.leak-row.top .leak-name{color:#f0d8e8;font-weight:600;}
.leak-row.top .leak-fill{background:linear-gradient(90deg,#a01060,#e53a91);}
.leak-row.top .leak-pct{color:#e53a91;}
.leak-row.low .leak-fill{background:linear-gradient(90deg,#6b2040,#a01060);}
.leak-row.low .leak-pct{color:#c090aa;}
.leak-pct{font-size:11px;font-weight:600;width:32px;text-align:right;flex-shrink:0;}
.opp-block{background:rgba(229,58,145,0.06);border:1px solid rgba(229,58,145,0.18);border-left:3px solid #e53a91;border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:22px;}
.opp-lbl{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:#e53a91;margin-bottom:7px;}
.opp-txt{font-size:13.5px;line-height:1.6;color:#f0d8e8;}
.leak-sec{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #4a2538;}
.leak-sec:last-of-type{border-bottom:none;margin-bottom:8px;}
.leak-badge{display:inline-flex;background:rgba(229,58,145,0.1);border:1px solid rgba(229,58,145,0.25);border-radius:100px;padding:4px 12px;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#e53a91;margin-bottom:9px;}
.leak-one{font-size:13.5px;line-height:1.65;color:#e0c4d4;font-weight:300;}
.closing{background:rgba(229,58,145,0.05);border:1px solid rgba(229,58,145,0.15);border-radius:14px;padding:20px 18px;margin-bottom:20px;}
.closing-txt{font-size:14px;line-height:1.75;color:#e0c4d4;font-weight:300;}
.closing-txt strong{color:#f0d8e8;font-weight:600;}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(135deg,#e53a91,#a01060);color:#fff;text-decoration:none;border-radius:14px;padding:18px 32px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:all 0.2s ease;box-shadow:0 6px 28px rgba(229,58,145,0.4);width:100%;margin-bottom:16px;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(229,58,145,0.5);}
.cta-perks{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.cta-perk{font-size:13px;color:#e0c4d4;display:flex;align-items:flex-start;gap:8px;}
.cta-check{color:#e53a91;font-weight:700;flex-shrink:0;}
.retake{display:block;margin:0 auto;background:none;border:1px solid #4a2538;border-radius:10px;padding:9px 22px;font-family:'DM Sans',sans-serif;font-size:12px;color:#c090aa;cursor:pointer;transition:all 0.2s ease;}
.retake:hover{border-color:rgba(229,58,145,0.4);color:#e0c4d4;}

@media(max-width:480px){
  .intro-wrap{padding:36px 24px 32px;}
  .intro-h1{font-size:30px;}
  .q-wrap,.r-wrap{padding:30px 22px 28px;}
  .q-text{font-size:19px;}
  .r-title{font-size:22px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="prog-wrap" id="progWrap">
    <div class="prog-meta">
      <span class="prog-label">StrongHER Progress Audit</span>
      <span class="prog-count" id="progCount">Question 1 of 15</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:6.67%"></div></div>
  </div>
  <div class="card">
    <div class="screen active" id="s-intro">
      <div class="intro-wrap">
        <div class="intro-eyebrow">StrongHER Progress Audit</div>
        <h1 class="intro-h1">Working hard.<br>Still stuck.<br><em>There is a reason.</em></h1>
        <p class="intro-body">Find out exactly what is getting in the way - and what to fix first.</p>
        <button class="intro-btn" id="startBtn">
          Show Me What Is In The Way
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="intro-stats">
          <div class="stat-col">
            <div class="stat-num">15</div>
            <div class="stat-lbl">Questions</div>
          </div>
          <div class="stat-col">
            <div class="stat-num">2<span style="font-size:13px">min</span></div>
            <div class="stat-lbl">To Complete</div>
          </div>
          <div class="stat-col">
            <div class="stat-num">100<span style="font-size:13px">%</span></div>
            <div class="stat-lbl">Personalized</div>
          </div>
        </div>
      </div>
    </div>
    <div id="qContainer"></div>
    <div id="rContainer"></div>
  </div>
</div>
<script>
var Qs=[
  {id:1,text:"When life gets busy, what is the first thing that disappears?",sub:"Pick what feels most true.",choices:[
    {t:"My workouts. Everything else takes priority.",s:{bandwidth:3,priority:2}},
    {t:"My meals. I stop eating properly or skip them.",s:{fuel:3,bandwidth:2}},
    {t:"My sleep. I stay up late trying to catch up.",s:{recovery:3,mental:2}},
    {t:"Everything at once. It all collapses together.",s:{mental:3,restart:2,bandwidth:2}}
  ]},
  {id:2,text:"What does a typical weekday look like by 5pm?",sub:"",choices:[
    {t:"Running on caffeine and whatever I grabbed between tasks.",s:{fuel:3,recovery:2}},
    {t:"Mentally exhausted - I have made a thousand decisions already.",s:{mental:3,bandwidth:2}},
    {t:"Behind on everything and trying to catch up.",s:{bandwidth:3,restart:1}},
    {t:"On autopilot, doing what needs to be done for everyone else.",s:{priority:3,support:2}}
  ]},
  {id:3,text:"When you miss a workout or eat off-plan, what usually happens next?",sub:"",choices:[
    {t:"I get back on track the next day - no big deal.",s:{restart:0,mental:0}},
    {t:"I tell myself I will restart Monday and coast until then.",s:{restart:4,mental:2}},
    {t:"I beat myself up and overthink what went wrong.",s:{restart:3,mental:3}},
    {t:"One slip turns into a full week off before I try again.",s:{restart:4,recovery:2}}
  ]},
  {id:4,text:"How would you describe your eating pattern most days?",sub:"",choices:[
    {t:"I eat pretty consistently and intentionally.",s:{fuel:0}},
    {t:"I graze or skip meals and eat bigger at night.",s:{fuel:3,recovery:2}},
    {t:"I finish my kids leftovers and call it a meal.",s:{fuel:3,priority:3}},
    {t:"I am so busy I forget to eat until I am starving.",s:{fuel:4,bandwidth:2}}
  ]},
  {id:5,text:"When do you usually eat your first real meal of the day?",sub:"",choices:[
    {t:"Within an hour of waking - I prioritize breakfast.",s:{fuel:0}},
    {t:"Mid-morning, once things calm down a little.",s:{fuel:1,bandwidth:1}},
    {t:"Lunchtime or later - mornings are chaotic.",s:{fuel:2,bandwidth:2}},
    {t:"Honestly? Sometimes 2pm or whenever I remember.",s:{fuel:3,mental:2}}
  ]},
  {id:6,text:"How often do you feel genuinely guilty about taking time for yourself?",sub:"",choices:[
    {t:"Rarely - I know I need to fill my own cup.",s:{priority:0,support:0}},
    {t:"Sometimes. I try not to but the guilt creeps in.",s:{priority:2,mental:1}},
    {t:"Often. I feel like I should be doing something for them.",s:{priority:3,mental:2}},
    {t:"Almost always. Putting myself first feels selfish.",s:{priority:4,mental:3,support:2}}
  ]},
  {id:7,text:"How would you describe your current stress level?",sub:"",choices:[
    {t:"Manageable - I have good coping systems.",s:{mental:0,recovery:0}},
    {t:"High but I keep moving. It is just normal mom life.",s:{mental:2,recovery:2,bandwidth:2}},
    {t:"Constantly on edge. I am always waiting for the next thing.",s:{mental:3,recovery:3,bandwidth:2}},
    {t:"I am so deep in it I do not even notice the stress anymore.",s:{mental:4,recovery:3,support:2}}
  ]},
  {id:8,text:"What does your sleep usually look like?",sub:"",choices:[
    {t:"Solid. I sleep 7+ hours and wake up feeling okay.",s:{recovery:0}},
    {t:"Light or interrupted - I wake up during the night.",s:{recovery:2,mental:1}},
    {t:"Short. I stay up too late and wake up too early.",s:{recovery:3,priority:2}},
    {t:"Unpredictable - it depends entirely on my kids.",s:{recovery:3,bandwidth:2,support:1}}
  ]},
  {id:9,text:"When you think about asking for help - with the kids, the house, your health - what happens?",sub:"",choices:[
    {t:"I ask and receive. I have a solid support network.",s:{support:0}},
    {t:"I could ask, but I feel bad about it.",s:{support:2,priority:2}},
    {t:"I do not really have people to ask.",s:{support:3,bandwidth:2}},
    {t:"It is easier and faster to just do it myself.",s:{support:3,mental:2,bandwidth:2}}
  ]},
  {id:10,text:"How often do you exercise in a typical week right now?",sub:"Be honest - not what you plan to do.",choices:[
    {t:"3 or more times. It is pretty consistent.",s:{restart:0,bandwidth:0}},
    {t:"1 to 2 times. I try but it is inconsistent.",s:{restart:2,bandwidth:2}},
    {t:"Rarely. Life keeps getting in the way.",s:{bandwidth:3,priority:2}},
    {t:"I am in a full stop right now. I have not started yet.",s:{restart:3,bandwidth:3,support:1}}
  ]},
  {id:11,text:"When you have tried a new health plan in the past, what usually went wrong?",sub:"",choices:[
    {t:"It was too rigid - one hard day and it all fell apart.",s:{restart:3,bandwidth:2}},
    {t:"I did not see results fast enough and lost motivation.",s:{restart:2,mental:2}},
    {t:"Life interrupted - family, work, illness - and I stopped.",s:{bandwidth:3,restart:2}},
    {t:"I did not have support or accountability.",s:{support:3,restart:2}}
  ]},
  {id:12,text:"How much time can you realistically commit to yourself each day?",sub:"",choices:[
    {t:"30+ minutes. I protect that time.",s:{bandwidth:0,priority:0}},
    {t:"15 to 30 minutes if I plan ahead.",s:{bandwidth:1,priority:1}},
    {t:"Maybe 10 to 15 minutes on a good day.",s:{bandwidth:3,priority:2}},
    {t:"I genuinely do not know. There is no predictable window.",s:{bandwidth:4,mental:3,priority:2}}
  ]},
  {id:13,text:"How do weekends usually affect your progress?",sub:"",choices:[
    {t:"I stay consistent. Weekends do not derail me.",s:{restart:0,fuel:0}},
    {t:"I loosen up but get back on track Monday.",s:{restart:1,fuel:1}},
    {t:"Weekends undo most of the week's progress.",s:{restart:3,fuel:3}},
    {t:"I write the whole weekend off and feel bad Monday.",s:{restart:4,mental:3,fuel:2}}
  ]},
  {id:14,text:"When you imagine finally feeling good in your body, what feels most out of reach?",sub:"",choices:[
    {t:"Consistency - showing up even when life is messy.",s:{restart:3,bandwidth:2}},
    {t:"Energy - I am too depleted to even try.",s:{recovery:3,fuel:2}},
    {t:"Time - there is simply none left after everyone else.",s:{bandwidth:3,priority:3}},
    {t:"Belief - part of me does not think it is possible anymore.",s:{mental:4,support:2,restart:2}}
  ]},
  {id:15,text:"What usually makes you decide to start over?",sub:"The honest answer - not the inspiring one.",choices:[
    {t:"Seeing a photo of myself or not fitting into something.",s:{mental:3,restart:2}},
    {t:"Feeling a health scare or getting a warning from my doctor.",s:{priority:3,support:2}},
    {t:"Hitting an emotional low - I am just done feeling this way.",s:{mental:3,restart:3}},
    {t:"Something external: a wedding, vacation, new year.",s:{restart:3,priority:2}}
  ]}
];

var LEAKS={mental:{name:"Mental Load Leak",short:"Mental Load"},fuel:{name:"Fuel Leak",short:"Fuel"},restart:{name:"Restart Leak",short:"Restart"},bandwidth:{name:"Bandwidth Leak",short:"Bandwidth"},recovery:{name:"Recovery Leak",short:"Recovery"},priority:{name:"Priority Leak",short:"Priority"},support:{name:"Support Leak",short:"Support"}};

var ONELINER={mental:"You are spending your decision-making energy on everyone else before you ever get to yourself.",fuel:"Your body is adapting to inconsistent fuel and slowing down to protect itself.",restart:"You do not have a commitment problem. You have a system that has no way to absorb a hard day.",bandwidth:"Your life does not have predictable space for a plan that requires it.",recovery:"Your body is trying to recover from a deficit it never fully gets to close.",priority:"Your health keeps landing at the bottom because everything else feels more urgent.",support:"You are trying to stay consistent in a system that has no one pulling you forward."};

var answers=[],scores={mental:0,fuel:0,restart:0,bandwidth:0,recovery:0,priority:0,support:0},built=false;

document.addEventListener("DOMContentLoaded",function(){
  var sb=document.getElementById("startBtn");
  if(sb)sb.addEventListener("click",startAudit);
  document.addEventListener("click",function(e){
    var ch=e.target.closest(".choice");
    if(ch&&ch.dataset.q!==undefined){pick(parseInt(ch.dataset.q),parseInt(ch.dataset.c),ch);return;}
    var bb=e.target.closest("[data-back]");
    if(bb){goBackQ(parseInt(bb.dataset.back));return;}
    if(e.target.classList.contains("retake")){retake();}
  });
});

function startAudit(){
  if(!built){buildQs();built=true;}
  document.getElementById("progWrap").style.display="block";
  updateProg(1);
  goTo("s-q-1");
}

function buildQs(){
  var c=document.getElementById("qContainer");
  Qs.forEach(function(q,i){
    var d=document.createElement("div");
    d.className="screen";
    d.id="s-q-"+(i+1);
    var ch=q.choices.map(function(x,ci){
      return "<button class='choice' data-q='"+i+"' data-c='"+ci+"'><div class='c-radio'></div><span class='c-text'>"+x.t+"</span></button>";
    }).join("");
    d.innerHTML="<div class='q-wrap'><div class='q-badge'>Question "+q.id+" of 15</div><h2 class='q-text'>"+q.text+"</h2>"+(q.sub?"<p class='q-sub'>"+q.sub+"</p>":"")+"<div class='choices'>"+ch+"</div><button class='back-btn' data-back='"+i+"'>&#8592; Back</button></div>";
    c.appendChild(d);
  });
}

function pick(qi,ci,el){
  el.closest(".choices").querySelectorAll(".choice").forEach(function(c){c.classList.remove("sel");});
  el.classList.add("sel");
  answers[qi]=ci;
  var s=Qs[qi].choices[ci].s;
  Object.keys(s).forEach(function(k){scores[k]+=s[k];});
  setTimeout(function(){
    if(qi<14){updateProg(qi+2);goTo("s-q-"+(qi+2));}
    else showResult();
  },350);
}

function goBackQ(qi){
  if(qi===0){document.getElementById("progWrap").style.display="none";goTo("s-intro");return;}
  if(answers[qi-1]!==undefined){
    var ps=Qs[qi-1].choices[answers[qi-1]].s;
    Object.keys(ps).forEach(function(k){scores[k]-=ps[k];});
    answers[qi-1]=undefined;
  }
  updateProg(qi);goTo("s-q-"+qi);
}

function updateProg(n){
  document.getElementById("progFill").style.width=((n/15)*100)+"%";
  document.getElementById("progCount").textContent="Question "+Math.min(n,15)+" of 15";
}

function getHealth(avg){
  if(avg<=30)return{label:"Needs Attention",color:"#e53a91"};
  if(avg<=55)return{label:"Building Momentum",color:"#c090aa"};
  return{label:"Strong Foundation",color:"#7a9b7c"};
}

function goTo(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active","exit");s.style.display="none";});
  var t=document.getElementById(id);
  if(t){t.style.display="block";requestAnimationFrame(function(){t.classList.add("active");});window.scrollTo(0,0);}
}

function retake(){
  answers=[];scores={mental:0,fuel:0,restart:0,bandwidth:0,recovery:0,priority:0,support:0};
  document.getElementById("rContainer").innerHTML="";
  document.querySelectorAll(".choice").forEach(function(c){c.classList.remove("sel");});
  document.getElementById("progWrap").style.display="none";
  goTo("s-intro");
}
