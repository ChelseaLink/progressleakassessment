<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrongHER Progress Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --hot-pink:#e53a91;--deep-pink:#a01060;
  --plum-hero:#1e0f18;--plum-mid:#2d1a24;
  --text-white:#ffffff;--text-soft:#e0c4d4;--text-light:#f0d8e8;
  --border:#4a2538;--muted:#c090aa;--glow:rgba(229,58,145,0.16);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--plum-hero);color:var(--text-white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(229,58,145,0.12) 0%,transparent 45%),radial-gradient(ellipse at 85% 90%,rgba(160,16,96,0.10) 0%,transparent 45%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:32px 20px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
.prog-wrap{margin-bottom:26px;opacity:0;animation:fadeUp 0.5s ease 0.1s forwards;}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.prog-count{font-size:10px;color:var(--muted);}
.prog-track{height:2px;background:var(--border);border-radius:10px;position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--deep-pink),var(--hot-pink));border-radius:10px;transition:width 0.65s cubic-bezier(0.4,0,0.2,1);position:relative;}
.prog-fill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--hot-pink);border-radius:50%;box-shadow:0 0 10px rgba(229,58,145,0.7);}
.card-wrap{opacity:0;animation:fadeUp 0.6s ease 0.2s forwards;}
.card{background:var(--plum-mid);border-radius:20px;padding:44px 50px 40px;border:1px solid var(--border);position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(21,10,18,0.5);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--hot-pink),var(--deep-pink),transparent);}
.screen{display:none;opacity:0;}
.screen.active{display:block;animation:fadeIn 0.4s ease forwards;}
.screen.exit{animation:fadeOut 0.2s ease forwards;}

/* INTRO */
.intro-logo{text-align:center;margin-bottom:28px;}
.intro-logo img{width:110px;height:auto;object-fit:contain;filter:drop-shadow(0 0 16px rgba(229,58,145,0.4));}
.intro-headline{font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1.22;color:var(--text-white);margin-bottom:12px;letter-spacing:-0.02em;text-align:center;}
.intro-headline em{font-style:italic;color:var(--hot-pink);}
.intro-tagline{font-size:15px;line-height:1.65;color:var(--text-soft);font-weight:300;margin-bottom:32px;text-align:center;}
.btn-start{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--hot-pink),var(--deep-pink));color:white;border:none;border-radius:12px;padding:16px 32px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s ease;width:100%;box-shadow:0 4px 24px rgba(229,58,145,0.35);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(229,58,145,0.45);}
.btn-start svg{width:15px;height:15px;transition:transform 0.2s ease;}
.btn-start:hover svg{transform:translateX(3px);}

/* QUESTION */
.q-badge{display:inline-flex;align-items:center;background:rgba(229,58,145,0.1);border:1px solid rgba(229,58,145,0.22);color:var(--hot-pink);font-size:9.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:5px 13px;border-radius:100px;margin-bottom:16px;}
.q-text{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.32;color:var(--text-white);margin-bottom:22px;letter-spacing:-0.01em;}
.q-sub{font-size:13px;color:var(--text-soft);margin-bottom:22px;font-weight:300;font-style:italic;margin-top:-14px;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:rgba(30,15,24,0.6);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.18s ease;text-align:left;width:100%;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;}
.choice::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glow),transparent);opacity:0;transition:opacity 0.18s ease;}
.choice:hover{border-color:rgba(229,58,145,0.45);transform:translateX(3px);}
.choice:hover::before,.choice.sel::before{opacity:1;}
.choice.sel{border-color:var(--hot-pink);background:rgba(229,58,145,0.07);transform:translateX(3px);}
.c-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.18s ease;position:relative;z-index:1;}
.choice:hover .c-radio{border-color:var(--hot-pink);}
.choice.sel .c-radio{border-color:var(--hot-pink);background:var(--hot-pink);box-shadow:0 0 8px rgba(229,58,145,0.5);}
.choice.sel .c-radio::after{content:'';width:6px;height:6px;background:white;border-radius:50%;}
.c-text{font-size:13.5px;line-height:1.5;color:var(--text-soft);position:relative;z-index:1;flex:1;}
.choice.sel .c-text{color:var(--text-light);font-weight:500;}
.btn-row{display:flex;align-items:center;justify-content:space-between;margin-top:22px;gap:16px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--hot-pink),var(--deep-pink));color:white;border:none;border-radius:12px;padding:14px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.18s ease;box-shadow:0 4px 24px rgba(229,58,145,0.32);}
.btn:hover{transform:translateY(-2px);}
.btn svg{width:14px;height:14px;transition:transform 0.18s ease;}
.btn:hover svg{transform:translateX(3px);}
.btn-ghost{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:8px;opacity:0.75;text-decoration:underline;text-underline-offset:3px;transition:opacity 0.18s;}
.btn-ghost:hover{opacity:1;color:var(--text-soft);}

/* RESULTS */
.result-label{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.result-label::before,.result-label::after{content:'';flex:1;height:1px;background:var(--border);}
.result-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:5px 15px;border-radius:100px;margin-bottom:18px;background:rgba(229,58,145,0.12);border:1px solid rgba(229,58,145,0.3);color:var(--hot-pink);}
.result-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.22;color:var(--text-white);margin-bottom:10px;letter-spacing:-0.01em;}
.result-title em{font-style:italic;color:var(--hot-pink);}
.result-sub{font-size:14px;color:var(--text-soft);line-height:1.6;font-weight:300;margin-bottom:24px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:22px 0;}
.health-label{font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:10px;}
.health-status{display:inline-flex;align-items:center;gap:8px;background:rgba(229,58,145,0.1);border:1px solid rgba(229,58,145,0.25);border-radius:100px;padding:8px 18px;margin-bottom:22px;}
.health-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.health-text{font-family:'Fraunces',serif;font-size:16px;font-weight:600;}
.dash-label{font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:14px;}
.leak-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.leak-row{display:flex;align-items:center;gap:12px;}
.leak-name{font-size:12px;font-weight:500;color:var(--text-soft);width:110px;flex-shrink:0;}
.leak-track{flex:1;height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.leak-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
.leak-pct{font-size:11px;font-weight:600;width:34px;text-align:right;flex-shrink:0;}
.leak-row.top .leak-name{color:var(--text-light);font-weight:600;}
.leak-row.top .leak-fill{background:linear-gradient(90deg,var(--deep-pink),var(--hot-pink));}
.leak-row.top .leak-pct{color:var(--hot-pink);}
.leak-row.low .leak-fill{background:linear-gradient(90deg,#6b2040,#a01060);}
.leak-row.low .leak-pct{color:var(--muted);}
.opp-block{background:rgba(229,58,145,0.06);border:1px solid rgba(229,58,145,0.18);border-left:3px solid var(--hot-pink);border-radius:0 12px 12px 0;padding:16px 18px;margin-bottom:22px;}
.opp-label{font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--hot-pink);margin-bottom:8px;}
.opp-text{font-size:14px;line-height:1.6;color:var(--text-light);}
.leak-sec{margin-bottom:24px;}
.leak-badge{display:inline-flex;align-items:center;background:rgba(229,58,145,0.1);border:1px solid rgba(229,58,145,0.25);border-radius:100px;padding:4px 12px;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--hot-pink);margin-bottom:10px;}
.leak-head{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--text-white);margin-bottom:10px;line-height:1.3;}
.leak-head em{font-style:italic;color:var(--hot-pink);}
.leak-body{font-size:13.5px;line-height:1.72;color:var(--text-soft);font-weight:300;margin-bottom:10px;}
.leak-cost{font-size:13px;line-height:1.6;color:var(--text-soft);font-style:italic;margin-bottom:12px;padding-left:12px;border-left:2px solid var(--border);}
.leak-action{background:rgba(229,58,145,0.05);border:1px solid rgba(229,58,145,0.15);border-radius:10px;padding:13px 15px;}
.act-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--hot-pink);margin-bottom:6px;}
.act-text{font-size:13.5px;line-height:1.6;color:var(--text-light);font-weight:500;}
.section-divider{text-align:center;margin:28px 0;display:flex;align-items:center;gap:12px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.section-divider-text{font-size:7px;color:var(--muted);letter-spacing:0.3em;opacity:0.5;flex-shrink:0;}
.closing{background:rgba(229,58,145,0.06);border:1px solid rgba(229,58,145,0.2);border-radius:14px;padding:22px 20px;margin-bottom:22px;text-align:center;}
.closing-icon{font-size:26px;margin-bottom:10px;}
.closing-text{font-size:14px;line-height:1.75;color:var(--text-soft);font-weight:300;}
.closing-text strong{color:var(--text-light);font-weight:600;}
.cta-bridge{font-size:14px;line-height:1.6;color:var(--text-soft);font-style:italic;margin-bottom:16px;text-align:center;}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(135deg,var(--hot-pink),var(--deep-pink));color:white;text-decoration:none;border-radius:14px;padding:18px 36px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:all 0.2s ease;box-shadow:0 6px 32px rgba(229,58,145,0.4);width:100%;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(229,58,145,0.5);}
.cta-perks{margin-top:16px;display:flex;flex-direction:column;gap:6px;}
.cta-perk{font-size:12.5px;color:var(--text-soft);display:flex;align-items:flex-start;gap:8px;text-align:left;}
.cta-check{color:var(--hot-pink);font-weight:700;flex-shrink:0;}
.cta-sub{margin-top:14px;font-size:11.5px;color:var(--muted);opacity:0.7;text-align:center;}
.retake{margin-top:14px;background:none;border:1px solid var(--border);border-radius:10px;padding:9px 22px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s ease;display:block;margin-left:auto;margin-right:auto;}
.retake:hover{border-color:rgba(229,58,145,0.4);color:var(--text-soft);}

.leak-sec-simple{padding:22px 20px;background:rgba(229,58,145,0.05);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;}
.leak-sec-simple:last-child{margin-bottom:4px;}
.leak-one-liner{font-size:14px;line-height:1.65;color:var(--text-light);font-weight:300;margin-top:10px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-6px)}}
.screen.active .choice:nth-child(1){animation:fadeUp 0.28s ease 0.03s both}
.screen.active .choice:nth-child(2){animation:fadeUp 0.28s ease 0.08s both}
.screen.active .choice:nth-child(3){animation:fadeUp 0.28s ease 0.13s both}
.screen.active .choice:nth-child(4){animation:fadeUp 0.28s ease 0.18s both}
@media(max-width:520px){
  .wrap{padding:22px 14px 44px;}
  .card{padding:28px 20px 26px;}
  .intro-headline{font-size:24px;}
  .q-text{font-size:19px;}
  .result-title{font-size:22px;}
  .btn-row{flex-direction:column;align-items:stretch;}
  .btn-ghost{text-align:center;}
}
</style>
</head>

var LEAKS={mental:{name:'Mental Load Leak',short:'Mental Load'},fuel:{name:'Fuel Leak',short:'Fuel'},restart:{name:'Restart Leak',short:'Restart'},bandwidth:{name:'Bandwidth Leak',short:'Bandwidth'},recovery:{name:'Recovery Leak',short:'Recovery'},priority:{name:'Priority Leak',short:'Priority'},support:{name:'Support Leak',short:'Support'}};

var CONTENT={
  mental:{headline:"You're spending your follow-through <em>before you ever get to yourself.</em>",body:"By the time you reach any moment that could be yours, your decision-making capacity is already gone. You've been managing everyone else's needs, anticipating problems, solving things before they break. It's invisible labor  -  and it costs more energy than any workout.",cost:"This leak quietly drains your consistency because every health decision requires willpower you have already spent. It's not lack of motivation. It's cognitive depletion.",action:"This week, make one health decision the night before  -  lay out your workout clothes, prep one protein source, decide your morning meal. Removing even one daily decision can meaningfully reduce the toll."},
  fuel:{headline:"Your body has been running on <em>the wrong kind of empty.</em>",body:"Skipping meals, grazing on leftovers, eating your biggest meal when your body is winding down  -  these patterns do not just affect energy. They affect your hormones, your hunger signals, and your body's willingness to let go of stored fat. Your body is not malfunctioning. It's adapting to scarcity.",cost:"This leak silently slows your metabolism because underfueling triggers a conservation response. You can exercise consistently and still make no visible progress if your fuel patterns are working against you.",action:"This week, eat something with at least 25g of protein within 60 minutes of waking  -  before coffee if possible. This one shift starts resetting the hormonal pattern that is been keeping your metabolism in low gear."},
  restart:{headline:"You do not have a commitment problem. <em>You have a recovery system problem.</em>",body:"You know how to start. You've started more times than you can count, and you always begin strong. The issue is not motivation or discipline  -  it is that your current approach has no way to absorb a hard day. One missed workout becomes a week off because there is no planned way back in.",cost:"This leak costs you compounding progress. Every restart puts you back at zero instead of slightly behind. Over months and years, the gap between where you are and where you could be grows  -  not from lack of effort but from lack of a recovery system.",action:"This week, write one sentence: 'When I miss a workout, I will ____.' Fill in something small and immediate  -  a 10-minute walk, one set of anything. Give yourself a planned way back in before you ever need it."},
  bandwidth:{headline:"You're not failing to make time. <em>There genuinely is not any.</em>",body:"Most health plans assume you have predictable, protected pockets of time. You do not. Your capacity is being consumed by real demands  -  kids, work, unpredictability, the invisible ten things nobody else is managing. Telling someone in your position to 'just wake up earlier' is advice built for someone with a completely different life.",cost:"This leak undermines every plan you try because your system requires more bandwidth than you currently have. It's not a willpower issue  -  it is a structural mismatch between the plan and your reality.",action:"This week, identify your one most reliable 15-minute window  -  not the ideal window, the realistic one. Build one habit there and only there. Consistency in a small window beats perfection in a window that never comes."},
  recovery:{headline:"Your body is trying to recover from a deficit <em>it never gets to close.</em>",body:"Sleep interruptions, high cortisol, chronic low-grade stress, never fully switching off  -  these are not just comfort issues. They directly affect your body's ability to recover from exercise, regulate hunger, manage inflammation, and lose fat. You can do everything right and still feel like nothing is working if your recovery is this compromised.",cost:"This leak means your body is spending its limited recovery resources on stress management instead of muscle repair and fat metabolism. You're working against a system that does not have enough left to adapt.",action:"This week, create a hard stop time  -  even 20 minutes earlier than usual. No screens, no problem-solving, no catching up. Your nervous system needs a consistent signal that the day is actually over."},
  priority:{headline:"You've been running on the belief that <em>your needs come last.</em>",body:"This is not laziness or lack of desire. Somewhere along the way, taking care of yourself started feeling like a withdrawal from your family instead of an investment in them. So you wait for leftover time, leftover energy, leftover permission  -  and it never quite arrives.",cost:"This leak keeps your health permanently in 'someday' mode. Not because you do not want it badly enough but because the way you have framed self-care makes it feel incompatible with being a good mom.",action:"This week, schedule one thing for yourself with the same firmness you would schedule a kid's doctor appointment. Put it in the calendar. Don't negotiate it away. Notice how it feels to treat your health as non-optional."},
  support:{headline:"You're carrying something <em>that was never meant to be carried alone.</em>",body:"It's not just about having a gym buddy. It's about having a system that does not collapse the moment life gets hard  -  because someone is in it with you. Right now, when you fall off, there is no one to catch you. When you are struggling to show up, there is nothing pulling you forward.",cost:"This leak makes every hard moment an exit ramp. Without accountability and community, the path of least resistance will always be stepping back  -  and stepping back feels easier than it should.",action:"This week, tell one person  -  a friend, your partner, anyone  -  one specific thing you are working on and ask them to check in with you about it on Friday. External accountability activates follow-through in a way internal motivation rarely can."}
};

var answers=[],scores={mental:0,fuel:0,restart:0,bandwidth:0,recovery:0,priority:0,support:0},built=false;

function startAudit(){
  if(!built){buildQs();built=true;}
  document.getElementById('progWrap').style.display='block';
  updateProg(1);
  goTo('s-q-1');
}

function buildQs(){
  var c=document.getElementById('qContainer');
  Qs.forEach(function(q,i){
    var d=document.createElement('div');
    d.className='screen';
    d.id='s-q-'+(i+1);
    var choicesHTML=q.choices.map(function(ch,ci){
      return '<button class="choice" data-q="'+i+'" data-c="'+ci+'"><div class="c-radio"></div><span class="c-text">'+ch.t+'</span></button>';
    }).join('');
    d.innerHTML='<div class="q-badge">Question '+q.id+' of 15</div>'+
      '<h2 class="q-text">'+q.text+'</h2>'+
      (q.sub?'<p class="q-sub">'+q.sub+'</p>':'')+
      '<div class="choices">'+choicesHTML+'</div>'+
      '<div class="btn-row"><button class="btn-ghost" data-back="'+i+'">&#8592; Back</button></div>';
    c.appendChild(d);
  });
}


function pick(qi,ci,el){
  el.closest('.choices').querySelectorAll('.choice').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
  answers[qi]=ci;

  // Auto-advance after short delay so user sees selection
  setTimeout(function(){ nextQ(qi); }, 350);
}

function nextQ(qi){
  if(answers[qi]===undefined)return;
  var ch=Qs[qi].choices[answers[qi]];
  Object.keys(ch.s).forEach(function(k){scores[k]+=ch.s[k];});
  if(qi<14){updateProg(qi+2);goTo('s-q-'+(qi+2));}
  else showResult();
}

function goBackQ(qi){
  if(qi===0){document.getElementById('progWrap').style.display='none';goTo('s-intro');return;}
  if(answers[qi-1]!==undefined){
    var prev=Qs[qi-1].choices[answers[qi-1]];
    Object.keys(prev.s).forEach(function(k){scores[k]-=prev.s[k];});
  }
  updateProg(qi);goTo('s-q-'+qi);
}

function updateProg(n){
  document.getElementById('progFill').style.width=((n/15)*100)+'%';
  document.getElementById('progCount').textContent='Question '+Math.min(n,15)+' of 15';
}

function getHealth(avg){
  if(avg<=30)return{label:'Needs Attention',color:'#e53a91'};
  if(avg<=55)return{label:'Building Momentum',color:'#c090aa'};
  return{label:'Strong Foundation',color:'#7a9b7c'};
}

function showResult(){
  var MAX=12,pcts={};
  Object.keys(scores).forEach(function(k){var raw=Math.min(Math.round((scores[k]/MAX)*100),98);pcts[k]=100-raw;});
  var ranked=Object.keys(pcts).sort(function(a,b){return pcts[a]-pcts[b];});
  var top3=ranked.slice(0,3);
  var avg=Math.round((pcts[top3[0]]+pcts[top3[1]]+pcts[top3[2]])/3);
  var health=getHealth(avg);

  var LEAK_ONE_LINER = {
    mental:   'You are spending your decision-making energy on everyone else before you ever get to yourself.',
    fuel:     'Your body is adapting to inconsistent fuel — and slowing down to protect itself.',
    restart:  'You do not have a commitment problem. You have a system that has no way to absorb a hard day.',
    bandwidth:'Your life does not have predictable space for a plan that requires it.',
    recovery: 'Your body is trying to recover from a deficit it never fully gets to close.',
    priority: 'Your health keeps landing at the bottom because everything else feels more urgent.',
    support:  'You are trying to stay consistent in a system that has no one pulling you forward.'
  };

  var parts=[];
  parts.push('<div class="screen active" id="s-result">');

  // Header
  parts.push('<div class="result-label">StrongHER Progress Audit</div>');
  parts.push('<h2 class="result-title">Where your system is <em>leaking progress.</em></h2>');

  // Health badge
  parts.push('<div class="health-status" style="margin-bottom:22px;"><div class="health-dot" style="background:'+health.color+';box-shadow:0 0 6px '+health.color+'"></div><span class="health-text" style="color:'+health.color+'">System Health: '+health.label+'</span></div>');

  parts.push('<div class="divider"></div>');

  // Dashboard
  parts.push('<div class="dash-label">System Strength by Area</div>');
  parts.push('<div class="leak-bars">');
  ranked.forEach(function(k,i){
    var cls=i<3?'top':'low';
    parts.push('<div class="leak-row '+cls+'"><span class="leak-name">'+LEAKS[k].short+'</span><div class="leak-track"><div class="leak-fill" id="bar-'+k+'" style="width:0%"></div></div><span class="leak-pct">'+pcts[k]+'%</span></div>');
  });
  parts.push('</div>');

  parts.push('<div class="divider"></div>');

  // Top 3 — condensed, one-liner each
  parts.push('<p style="font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:16px;">Your Top 3 Progress Leaks</p>');
  top3.forEach(function(k,i){
    parts.push('<div class="leak-sec-simple">');
    parts.push('<div class="leak-badge">'+LEAKS[k].name+'</div>');
    parts.push('<p class="leak-one-liner">'+LEAK_ONE_LINER[k]+'</p>');
    parts.push('</div>');
  });

  parts.push('<div class="section-divider"><span class="section-divider-text">&#9679; &#9679; &#9679;</span></div>');

  // Puddle closer — short
  parts.push('<div class="closing">');
  parts.push('<p class="closing-text">You have been working hard. Probably harder than the results show.<br><br>The audit shows where progress is leaking. What comes next is figuring out why  -  and exactly where to start.<br><br><strong>That is what we figure out together.</strong></p>');
  parts.push('</div>');

  // CTA
  
  parts.push('<a href="https://api.leadconnectorhq.com/widget/booking/nT1zpxXj89lkUmQmczY7" target="_blank" class="cta-btn">Book My FREE StrongHER Starting Point Call <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a>');
  parts.push('<div class="cta-perks">');
  parts.push('<div class="cta-perk"><span class="cta-check">&#10003;</span>Find out which leak is quietly driving all the others</div>');
  parts.push('<div class="cta-perk"><span class="cta-check">&#10003;</span>Get clear on exactly what to focus on first  -  and what to stop doing</div>');
  parts.push('<div class="cta-perk"><span class="cta-check">&#10003;</span>Leave with a real starting point that actually fits your life</div>');
  parts.push('</div>');
  parts.push('<button class="retake">Retake the audit</button>');
  parts.push('</div>');

  document.getElementById('rContainer').innerHTML=parts.join('');
  document.getElementById('progWrap').style.display='none';
  document.querySelectorAll('.screen').forEach(function(s){if(s.id!=='s-result'){s.classList.remove('active');s.style.display='none';}});
  setTimeout(function(){ranked.forEach(function(k){var el=document.getElementById('bar-'+k);if(el){el.style.width=pcts[k]+'%';}});},400);
}


function goTo(id){
  // Hide all screens
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active','exit');
    s.style.display='none';
  });
  // Show target
  var t=document.getElementById(id);
  if(t){
    t.style.display='block';
    t.classList.add('active');
    window.scrollTo(0,0);
  }
}

function retake(){
  answers=[];
  scores={mental:0,fuel:0,restart:0,bandwidth:0,recovery:0,priority:0,support:0};
  document.getElementById('rContainer').innerHTML='';
  document.querySelectorAll('.choice').forEach(function(c){c.classList.remove('sel');});
  document.querySelectorAll('[id^="nb"]').forEach(function(b){b.disabled=true;b.style.opacity='0.38';b.style.cursor='not-allowed';});
  document.getElementById('progWrap').style.display='none';
  goTo('s-intro');
}

document.addEventListener('DOMContentLoaded', function() {
  // Start button
  var sb = document.getElementById('startBtn');
  if(sb) sb.addEventListener('click', startAudit);

  // Event delegation for dynamically created elements
  document.addEventListener('click', function(e) {
    // Choice selection
    var choice = e.target.closest('.choice');
    if(choice && choice.dataset.q !== undefined) {
      pick(parseInt(choice.dataset.q), parseInt(choice.dataset.c), choice);
      return;
    }

    // Back button
    var bb = e.target.closest('[data-back]');
    if(bb) {
      goBackQ(parseInt(bb.dataset.back));
      return;
    }
    // Retake button
    if(e.target.classList.contains('retake')) {
      retake();
      return;
    }
  });
});
</script>
